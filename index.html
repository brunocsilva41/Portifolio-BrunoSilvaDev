<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bruno Silva | Dev Portfolio</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="stars-bg"></div>
    <div id="nebula-bg"></div>

    <div id="loading">
      <div class="loader-star">
        <svg width="40" height="40" viewBox="0 0 40 40"><path d="M20 2 L23.5 15 L37 15 L26 24 L29 38 L20 29 L11 38 L14 24 L3 15 L16.5 15 Z" fill="rgba(200,215,255,0.8)"/></svg>
      </div>
      <p id="loading-text"></p>
    </div>

    <div id="main-content">
      <header id="hero">
        <div class="hero-star" id="hero-star">
          <svg width="48" height="48" viewBox="0 0 48 48"><path d="M24 3 L28.5 17 L43 17 L31 27 L35 42 L24 33 L13 42 L17 27 L5 17 L19.5 17 Z" fill="url(#heroGrad)"/><defs><linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#8aacff"/></linearGradient></defs></svg>
        </div>
        <h1 class="hero-title"><span class="gradient-text">BRUNO SILVA</span></h1>
        <p class="hero-sub">Full-Stack Developer &middot; Constelação de Projetos</p>
        <p class="hero-hint">✦ Explore as estrelas para descobrir meus projetos ✦</p>
      </header>

      <div id="nav-console">
        <div class="console-label">SELECIONE O DESTINO</div>
        <div class="console-btns">
          <button class="nav-star" data-group="frontend">
            <svg class="star-icon" width="20" height="20" viewBox="0 0 48 48"><path d="M24 3 L28.5 17 L43 17 L31 27 L35 42 L24 33 L13 42 L17 27 L5 17 L19.5 17 Z" fill="rgba(108,140,255,0.9)"/></svg>
            <span class="nav-label">Frontend & Web</span>
          </button>
          <button class="nav-star" data-group="backend">
            <svg class="star-icon" width="20" height="20" viewBox="0 0 48 48"><path d="M24 3 L28.5 17 L43 17 L31 27 L35 42 L24 33 L13 42 L17 27 L5 17 L19.5 17 Z" fill="rgba(80,227,194,0.9)"/></svg>
            <span class="nav-label">Backend & Infra</span>
          </button>
          <button class="nav-star" data-group="tools">
            <svg class="star-icon" width="20" height="20" viewBox="0 0 48 48"><path d="M24 3 L28.5 17 L43 17 L31 27 L35 42 L24 33 L13 42 L17 27 L5 17 L19.5 17 Z" fill="rgba(167,139,250,0.9)"/></svg>
            <span class="nav-label">AI & Automação</span>
          </button>
        </div>
      </div>

      <div id="bottom-bar">
        <button id="view-btn" title="Alternar visão">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          STACKS
        </button>
        <button id="overview-btn" title="Visão geral">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="theme-btn" title="Tema nebulosa">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="reset-btn" title="Resetar constelação">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button id="import-btn" title="Importar projeto do GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div id="import-modal">
      <div id="import-backdrop"></div>
      <div id="import-container">
        <button id="import-close">&times;</button>
        <h2>Importar Projeto do GitHub</h2>
        <p class="import-sub">Cole a URL do reposit&oacute;rio para importar automaticamente</p>
        <form id="import-form">
          <div class="import-input-wrap">
            <input type="url" id="import-url" placeholder="https://github.com/usuario/repositorio" required />
            <button type="submit">Buscar</button>
          </div>
        </form>
        <div id="import-status"></div>
        <div id="import-preview">
          <div class="preview-header">
            <span class="preview-tag" id="preview-tag"></span>
            <h3 id="preview-title" class="preview-title"></h3>
            <div class="preview-role" id="preview-role"></div>
          </div>
          <p id="preview-desc" class="preview-desc"></p>
          <div class="preview-techs" id="preview-techs"></div>
          <a id="preview-link" class="preview-link" target="_blank"></a>
        </div>
        <button id="import-confirm" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Adicionar &agrave; Constela&ccedil;&atilde;o
        </button>
      </div>
    </div>

    <div id="project-overlay">
      <div class="backdrop"></div>
      <div id="project-card">
        <button class="close-btn" id="close-btn">&times;</button>
        <div class="tag" id="p-tag"></div>
        <h2 id="p-title"></h2>
        <div class="project-role" id="p-role"></div>
        <div class="project-desc" id="p-desc"></div>
        <div class="tech-stack" id="p-tech"></div>
        <div class="project-links" id="p-links"></div>
        <div id="p-qr" class="qr-section" style="display:none">
          <img id="qr-img" src="" alt="QR Code" />
        </div>
        <button id="delete-btn" class="delete-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Remover da constela&ccedil;&atilde;o
        </button>
      </div>
    </div>

    <div id="travel-status"></div>
    <div id="toast"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
